name: Sync Docker Hub Description

# 将 DEPLOY.md 自动同步到 Docker Hub 仓库的「Overview」。
# 需在 GitHub 仓库 Settings → Secrets and variables → Actions 配置：
#   - DOCKERHUB_USERNAME : Docker Hub 用户名
#   - DOCKERHUB_TOKEN    : Docker Hub 访问令牌（Account Settings → Security → New Access Token，需 Read & Write）
on:
  push:
    branches: [main]
    paths:
      - DEPLOY.md
      - .github/workflows/dockerhub-description.yml
  workflow_dispatch:

jobs:
  dockerhub-description:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: kumayi/film-fusion
          readme-filepath: ./DEPLOY.md
          short-description: "媒体文件管理与自动化处理服务（Emby 直链代理 / 115 / STRM / 观看统计）"
